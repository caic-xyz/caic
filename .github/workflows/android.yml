# CI workflow for Android builds, lint, and tests.
name: Android
on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/android.yml'
      - 'android/**'
      - 'scripts/android_e2e.py'
      - 'sdk/kotlin/**'
  pull_request:
    paths:
      - '.github/workflows/android.yml'
      - 'android/**'
      - 'scripts/android_e2e.py'
      - 'sdk/kotlin/**'
permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          build-root-directory: android
      - name: Accept Android SDK Licenses
        run: yes | "$ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager" --licenses || true
      - name: Lint
        run: make lint-android
      - name: Build
        run: make android-build
      - name: Upload APK
        uses: actions/upload-artifact@v6
        with:
          name: app-debug.apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
      - name: Test
        run: make android-test
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: E2E Test
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -memory 2048 -partition-size 4096
          disable-animations: true
          emulator-boot-timeout: 600
          script: |
            adb shell 'while ! pm list packages > /dev/null 2>&1; do echo "Waiting for package manager..."; sleep 2; done'
            make android-e2e
      - name: Upload lint results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: lint-results
          path: |
            android/app/build/reports/lint-results-debug.xml
            android/app/build/reports/detekt/
          retention-days: 14
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results
          path: android/app/build/reports/tests/
          retention-days: 14
